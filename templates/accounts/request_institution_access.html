{% extends "base.html" %}

{% block content %}
<section class="card narrow">
    <h2>Institution Access Request</h2>
    <p>Submit this request to Government Admin for Institution/Exam Body account provisioning.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit Request</button>
        <a class="button-link secondary" href="{% url 'login' %}?portal=institution">Back to Login</a>
    </form>
</section>
{% endblock %}
