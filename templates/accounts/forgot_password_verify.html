{% extends "base.html" %}

{% block content %}
<section class="card narrow">
    <h2>Reset password</h2>
    <p>Check your email for the 6-digit code, then set a new password.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Reset password</button>
    </form>
    <p class="login-note">
        Didn’t get a code? <a href="{% url 'forgot_password_request' %}">Request a new one</a>.
    </p>
</section>
{% endblock %}
