{% extends "base.html" %}

{% block content %}
<section class="card narrow">
    <h2>Forgot password</h2>
    <p>Enter the email you use to sign in. We will send a 6-digit code to reset your password.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send reset code</button>
    </form>
    <p class="login-note"><a href="{% url 'login' %}">Back to login</a></p>
</section>
{% endblock %}
